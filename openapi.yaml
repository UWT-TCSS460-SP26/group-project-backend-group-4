  /api/ratings:
    get:
      tags: [Ratings]
      summary: List Ratings
      description: Retrieve a paginated list of ratings. Filterable by user, media, or TMDB ID and type.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: mediaId
          in: query
          required: false
          schema:
            type: integer
        - name: tmdbId
          in: query
          required: false
          schema:
            type: integer
          description: Filter by TMDB id. Must be provided with `type`.
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [MOVIE, TV_SHOW]
          description: Media type for `tmdbId` filter. Must be provided with `tmdbId`.
      responses:
        '200':
          description: A paginated list of ratings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        score:
                          type: integer
                          example: 5
                        userId:
                          type: integer
                          example: 42
                        mediaId:
                          type: integer
                          example: 105
                        user:
                          type: object
                          properties:
                            username:
                              type: string
                              example: moviecritic99
                        media:
                          type: object
                          properties:
                            tmdbId:
                              type: integer
                              example: 550
                            type:
                              type: string
                              example: MOVIE
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 20
                      total:
                        type: integer
                        example: 100
                      totalPages:
                        type: integer
                        example: 5
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              examples:
                missingTmdbIdOrType:
                  summary: Missing tmdbId or type
                  value:
                    message: Both tmdbId and type are required together.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
    post:
      tags: [Ratings]
      summary: Create Rating
      description: Submit a new rating. If the media doesn't exist, it will be resolved and created automatically.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tmdbId, type, score]
              properties:
                tmdbId:
                  type: integer
                  example: 550
                type:
                  type: string
                  enum: [MOVIE, TV_SHOW]
                  example: MOVIE
                score:
                  type: integer
                  example: 5
                  minimum: 1
                  maximum: 5
      responses:
        '201':
          description: Rating successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  score:
                    type: integer
                    example: 5
                  userId:
                    type: integer
                    example: 42
                  mediaId:
                    type: integer
                    example: 105
        '400':
          description: Validation failed (e.g., invalid media type or score out of bounds)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              examples:
                invalidTmdbId:
                  summary: Invalid tmdbId
                  value:
                    message: Invalid tmdbId
                invalidType:
                  summary: Invalid media type
                  value:
                    message: Invalid media type
                invalidScore:
                  summary: Score out of bounds
                  value:
                    message: Invalid rating score. Please provide a score between 1 and 5.
        '401':
          description: Missing or invalid Token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Missing or invalid Token
        '409':
          description: Conflict - User has already rated this specific media
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User has already rated this media.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error
