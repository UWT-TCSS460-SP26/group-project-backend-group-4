openapi: 3.0.3
info:
  title: TCSS 460 Group Project API
  description: |
    **Team:** Group 4
    **Deployed URL:** https://group-project-backend-group-4.onrender.com

    A RESTful API for a move and TV review community.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://group-project-backend-group-4.onrender.com
    description: Production deployment

tags:
  - name: General
    description: General-purpose routes
  - name: Authentication
    description: Routes for user authentication
  - name: Movies
    description: Routes used with Movies
  - name: TV Shows
    description: Routes used with TV Shows

paths:
  /heartbeat:
    get:
      tags: [General]
      summary: Heartbeat
      description: Returns the health status of the API.
      responses:
        '200':
          description: API is alive and running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'healthy'
  /auth/dev-login:
    post:
      tags: [Authentication]
      summary: Dev Login
      description: |
        **TEMPORARY — Sprint 2 only.**
        Accepts a username, find-or-creates a user row with role='user', and returns a signed JWT.
        This endpoint does NOT validate a password. It is a local-development stand-in for the real Auth-Squared integration coming in Sprint 3.
        **DO NOT deploy this router to a public URL.**

        Admin accounts must be seeded separately — this endpoint only creates regular users. To log in as an admin, create the user via your seed script and then POST the same username here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  example: alice
                email:
                  type: string
                  format: email
                  example: alice@example.test
                  description: Optional; defaults to username@dev.local
      responses:
        '200':
          description: Successfully logged in and returned a JWT
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Missing or invalid username
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: username is required
        '500':
          description: Server configuration error (e.g. JWT_SECRET missing)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: JWT_SECRET is not configured
  /api/movies/{movie_id}:
    get:
      tags: [Movies]
      summary: Movie Details
      description: Provides details on the provided movie, based on it's provided id
      parameters:
        - name: movie_id
          in: path
          required: true
          schema:
            type: integer
          description: TMDB movie ID
      responses:
        '200':
          description: Successfully get back movie details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                    example: 550
                  title:
                    type: string
                    example: Fight Club
                  overview:
                    type: string
                    example: A ticking-time-bomb insomniac and a slippery soap salesman channel primal male aggression into a shocking new form of therapy. Their concept catches on, with underground \"fight clubs\" forming in every town, until an eccentric gets in the way and ignites an out-of-control spiral toward oblivion.
                  release_date:
                    type: string
                    example: '1999-10-15'
                  poster_path:
                    type: string
                    example: /jSziioSwPVrOy9Yow3XhWIBDjq1.jpg
                  budget:
                    type: number
                    example: 63000000
                  genres:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                          example: 18
                        name:
                          type: string
                          example: Drama
        '400':
          description: movie_id missing in route parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: movie_id is required
        '404':
          description: movie_id doesn't exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: The resource you requested could not be found.
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/movies/popular:
    get:
      tags: [Movies]
      summary: Popular Movies
      description: Returns content sorted by popularity using the TMDB discover endpoint. Showcases widely appealing movies.
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            default: 'desc'
            enum: ['desc', 'asc']
      responses:
        '200':
          description: Successfully retrieved a list of popular movies
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    title:
                      type: string
                    overview:
                      type: string
                    release_date:
                      type: string
                    poster_path:
                      type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/movies/featured:
    get:
      tags: [Movies]
      summary: Featured Movies
      description: Returns trending movies over a specified time frame. This is a temporary solution until the user-based recommendation system is implemented.
      parameters:
        - name: timeframe
          in: query
          required: false
          schema:
            type: string
            enum: [day, week]
            default: week
          description: The time frame for the trending movies.
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
      responses:
        '200':
          description: Successfully retrieved a list of featured movies
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    title:
                      type: string
                    overview:
                      type: string
                    release_date:
                      type: string
                    poster_path:
                      type: string
                    backdrop_path:
                      type: string
                    genre_ids:
                      type: array
                      items:
                        type: integer
                    original_language:
                      type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/movies/search:
    get:
      tags: [Movies]
      summary: Search Movies
      description: Search movies by title.
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          description: Search term for movie titles.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 1000
          description: Page number for TMDB pagination.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          description: Maximum number of results returned in this response.
      responses:
        '200':
          description: Successfully retrieved movie search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    example: 1
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        title:
                          type: string
                        release_date:
                          type: string
                        poster_path:
                          type: string
        '400':
          description: Invalid search query or pagination parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                missingQuery:
                  summary: Missing required title parameter
                  value:
                    error: title is required and must be a string
                invalidPagination:
                  summary: Invalid page or limit values
                  value:
                    error: Validation failed
                    details: page must be an integer between 1 and 1000
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/tv/search:
    get:
      tags: [TV Shows]
      summary: Search TV Shows
      description: Search TV shows by title.
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          description: Search term for TV show titles.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 1000
          description: Page number for TMDB pagination.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          description: Maximum number of results returned in this response.
      responses:
        '200':
          description: Successfully retrieved TV search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    example: 1
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        title:
                          type: string
                        release_date:
                          type: string
                        poster_path:
                          type: string
        '400':
          description: Invalid search query or pagination parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                missingQuery:
                  summary: Missing required title parameter
                  value:
                    error: title is required and must be a string
                invalidPagination:
                  summary: Invalid page or limit values
                  value:
                    error: Validation failed
                    details: page must be an integer between 1 and 1000
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/tv/{series_id}:
    get:
      tags: [TV Shows]
      summary: TV Show Details
      description: Provides details on the provided TV Show, based on it's provided id
      parameters:
        - name: series_id
          in: path
          required: true
          schema:
            type: integer
          description: TMDB series ID
      responses:
        '200':
          description: Successfully get back TV details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                    example: 1396
                  name:
                    type: string
                    example: Breaking Bad
                  overview:
                    type: string
                    example: Walter White, a New Mexico chemistry teacher, is diagnosed with Stage III cancer and given a prognosis of only two years left to live. He becomes filled with a sense of fearlessness and an unrelenting desire to secure his family's financial future at any cost as he enters the dangerous world of drugs and crime.
                  first_air_date:
                    type: string
                    example: 2008-01-20
                  poster_path:
                    type: string
                    example: /ztkUQFLlC19CCMYHW9o1zWhJRNq.jpg
                  status:
                    type: string
                    example: Ended
                  genres:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                          example: 18
                        name:
                          type: string
                          example: Drama
        '400':
          description: series_id missing in route parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: series_id is required
        '404':
          description: series_id doesn't exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: The resource you requested could not be found.
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/tv/featured:
    get:
      tags: [TV Shows]
      summary: Featured TV Shows
      description: Returns trending TV shows over a specified time frame. This is a temporary solution until the user-based recommendation system is implemented.
      parameters:
        - name: timeframe
          in: query
          required: false
          schema:
            type: string
            enum: [day, week]
            default: week
          description: The time frame for the trending TV shows.
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
      responses:
        '200':
          description: Successfully retrieved a list of featured TV shows
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    name:
                      type: string
                    overview:
                      type: string
                    first_air_date:
                      type: string
                    poster_path:
                      type: string
                    backdrop_path:
                      type: string
                    genre_ids:
                      type: array
                      items:
                        type: integer
                    original_language:
                      type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/tv/popular:
    get:
      tags: [TV Shows]
      summary: Popular TV Shows
      description: Returns content sorted by popularity using the TMDB discover endpoint. Showcases widely appealing TV shows.
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            default: 'desc'
            enum: ['desc', 'asc']
      responses:
        '200':
          description: Successfully retrieved a list of popular TV shows
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    name:
                      type: string
                    overview:
                      type: string
                    first_air_date:
                      type: string
                    poster_path:
                      type: string
                    backdrop_path:
                      type: string
                    genre_ids:
                      type: array
                      items:
                        type: integer
                    original_language:
                      type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /ratings:
    get:
      tags: [Ratings]
      summary: List Ratings
      description: Retrieve a paginated list of ratings. Filterable by user, media, or TMDB ID and type.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: mediaId
          in: query
          required: false
          schema:
            type: integer
        - name: tmdbId
          in: query
          required: false
          schema:
            type: integer
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [MOVIE, TV_SHOW]
      responses:
        '200':
          description: A paginated list of ratings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        score:
                          type: integer
                        userId:
                          type: integer
                        mediaId:
                          type: integer
                        user:
                          type: object
                          properties:
                            username:
                              type: string
                        media:
                          type: object
                          properties:
                            tmdbId:
                              type: integer
                            type:
                              type: string
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        '500':
          description: Internal Server Error
    post:
      tags: [Ratings]
      summary: Create Rating
      description: Submit a new rating. If the media doesn't exist, it will be resolved and created automatically.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tmdbId, type, score]
              properties:
                tmdbId:
                  type: integer
                type:
                  type: string
                  enum: [MOVIE, TV_SHOW]
                score:
                  type: integer
                minimum: 1
                maximum: 5
      responses:
        '201':
          description: Rating successfully created
        '400':
          description: Validation failed (e.g., invalid media type or score out of bounds)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              examples:
                invalidType:
                  summary: Invalid media type
                  value:
                    message: Invalid media type
                invalidScore:
                  summary: Score out of bounds
                  value:
                    message: Invalid rating score. Please provide a score between 1 and 5.
        '401':
          description: Missing or invalid Token
        '409':
          description: Conflict - User has already rated this specific media
        '500':
          description: Internal Server Error
  /ratings/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The primary key of the rating
    get:
      tags: [Ratings]
      summary: Get Rating by ID
      responses:
        '200':
          description: Successfully retrieved the rating
        '404':
          description: Record not found
        '500':
          description: Internal Server Error
    put:
      tags: [Ratings]
      summary: Update Rating
      description: Update an existing rating score. Requires the authenticated user to be the owner of the record.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
      responses:
        '200':
          description: Rating updated successfully
        '400':
          description: Validation failed (e.g., score out of bounds)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid rating score. Please provide a score between 1 and 5.
        '401':
          description: Missing or invalid Token
        '403':
          description: Not authorized to modify this record
        '404':
          description: Record not found
        '500':
          description: Internal Server Error
    delete:
      tags: [Ratings]
      summary: Delete Rating
      description: Delete a rating. Requires the authenticated user to be the owner of the record or have the ADMIN role.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Rating deleted successfully
        '401':
          description: Missing or invalid Token
        '403':
          description: Not authorized to modify this record
        '404':
          description: Record not found
        '500':
          description: Internal Server Error
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
