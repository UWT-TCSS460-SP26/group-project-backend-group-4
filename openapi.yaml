openapi: 3.0.3
info:
  title: TCSS 460 Group Project API
  description: |
    **Team:** Group 4
    **Deployed URL:** https://group-project-backend-group-4.onrender.com

    A RESTful API for a move and TV review community.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://group-project-backend-group-4.onrender.com
    description: Production deployment

tags:
  - name: General
    description: General-purpose routes
  - name: Authentication
    description: Routes for user authentication
  - name: Movies
    description: Routes used with Movies
  - name: TV Shows
    description: Routes used with TV Shows
  - name: Reviews
    description: Routes used with persisted user reviews

paths:
  /heartbeat:
    get:
      tags: [General]
      summary: Heartbeat
      description: Returns the health status of the API.
      responses:
        '200':
          description: API is alive and running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'healthy'
  /auth/dev-login:
    post:
      tags: [Authentication]
      summary: Dev Login
      description: |
        **TEMPORARY — Sprint 2 only.**
        Accepts a username, find-or-creates a user row with role='user', and returns a signed JWT.
        This endpoint does NOT validate a password. It is a local-development stand-in for the real Auth-Squared integration coming in Sprint 3.
        **DO NOT deploy this router to a public URL.**

        Admin accounts must be seeded separately — this endpoint only creates regular users. To log in as an admin, create the user via your seed script and then POST the same username here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  example: alice
                email:
                  type: string
                  format: email
                  example: alice@example.test
                  description: Optional; defaults to username@dev.local
      responses:
        '200':
          description: Successfully logged in and returned a JWT
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Missing or invalid username
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: username is required
        '500':
          description: Server configuration error (e.g. JWT_SECRET missing)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: JWT_SECRET is not configured
  /api/movies/{movie_id}:
    get:
      tags: [Movies]
      summary: Movie Details
      description: Provides details on the provided movie, based on it's provided id
      parameters:
        - name: movie_id
          in: path
          required: true
          schema:
            type: integer
          description: TMDB movie ID
      responses:
        '200':
          description: Successfully get back movie details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                    example: 550
                  title:
                    type: string
                    example: Fight Club
                  overview:
                    type: string
                    example: A ticking-time-bomb insomniac and a slippery soap salesman channel primal male aggression into a shocking new form of therapy. Their concept catches on, with underground \"fight clubs\" forming in every town, until an eccentric gets in the way and ignites an out-of-control spiral toward oblivion.
                  release_date:
                    type: string
                    example: '1999-10-15'
                  poster_path:
                    type: string
                    example: /jSziioSwPVrOy9Yow3XhWIBDjq1.jpg
                  budget:
                    type: number
                    example: 63000000
                  genres:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: Drama
                  community:
                    type: object
                    properties:
                      avgRating:
                        type: number
                        nullable: true
                        example: 4.2
                      totalRatings:
                        type: integer
                        example: 128
                      totalReviews:
                        type: integer
                        example: 34
                      recentReviews:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 7
                            title:
                              type: string
                              example: A modern classic
                            body:
                              type: string
                              example: One of the best films ever made.
                            author:
                              type: string
                              example: alice
                            createdAt:
                              type: string
                              format: date-time
                              example: '2024-11-01T12:34:56.000Z'
        '400':
          description: movie_id missing in route parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: movie_id is required
        '404':
          description: movie_id doesn't exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: The resource you requested could not be found.
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/movies/popular:
    get:
      tags: [Movies]
      summary: Popular Movies
      description: Returns content sorted by popularity using the TMDB discover endpoint. Showcases widely appealing movies.
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            default: 'desc'
            enum: ['desc', 'asc']
      responses:
        '200':
          description: Successfully retrieved a list of popular movies
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                      example: 1226863
                    title:
                      type: string
                      example: The Super Mario Galaxy Movie
                    overview:
                      type: string
                      example: "Having thwarted Bowser's previous plot to marry Princess Peach, Mario and Luigi now face a fresh threat in Bowser Jr..."
                    release_date:
                      type: string
                      example: '2026-04-01'
                    poster_path:
                      type: string
                      example: /eJGWx219ZcEMVQJhAgMiqo8tYY.jpg
                    backdrop_path:
                      type: string
                      example: /9Z2uDYXqJrlmePznQQJhL6d92Rq.jpg
                    genre_ids:
                      type: array
                      items:
                        type: integer
                      example: [10751, 35, 12, 14, 16]
                    original_language:
                      type: string
                      example: en
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
