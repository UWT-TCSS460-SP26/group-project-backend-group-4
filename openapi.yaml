                    overview:
                      type: string
                      example: "Having thwarted Bowser's previous plot to marry Princess Peach, Mario and Luigi now face a fresh threat in Bowser Jr..."
                    release_date:
                      type: string
                      example: '2026-04-01'
                    poster_path:
                      type: string
                      example: /eJGWx219ZcEMVQJhAgMiqo8tYY.jpg
                    backdrop_path:
                      type: string
                      example: /9Z2uDYXqJrlmePznQQJhL6d92Rq.jpg
                    genre_ids:
                      type: array
                      items:
                        type: integer
                      example: [10751, 35, 12, 14, 16]
                    original_language:
                      type: string
