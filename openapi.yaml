      tags: [TV Shows]
      summary: TV Show Details
      description: Provides details on the provided TV Show, based on it's provided id
      parameters:
        - name: series_id
          in: path
          required: true
          schema:
            type: integer
          description: TMDB series ID
      responses:
        '200':
          description: Successfully get back TV details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                    example: 1396
                  name:
                    type: string
                    example: Breaking Bad
                  overview:
                    type: string
                    example: Walter White, a New Mexico chemistry teacher, is diagnosed with Stage III cancer and given a prognosis of only two years left to live. He becomes filled with a sense of fearlessness and an unrelenting desire to secure his family's financial future at any cost as he enters the dangerous world of drugs and crime.
                  first_air_date:
                    type: string
                    example: 2008-01-20
                  poster_path:
                    type: string
                    example: /ztkUQFLlC19CCMYHW9o1zWhJRNq.jpg
                  status:
                    type: string
                    example: Ended
                  genres:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: Drama
                  community:
                    type: object
                    properties:
                      avgRating:
                        type: number
                        nullable: true
                        example: 4.7
                      totalRatings:
                        type: integer
                        example: 512
                      totalReviews:
                        type: integer
                        example: 98
                      recentReviews:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 12
                            title:
                              type: string
                              example: Absolute masterpiece
                            body:
                              type: string
                              example: Best show on television.
                            author:
                              type: string
                              example: bob
                            createdAt:
                              type: string
                              format: date-time
                              example: '2024-10-15T09:00:00.000Z'
        '400':
          description: series_id missing in route parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: series_id is required
        '404':
          description: series_id doesn't exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: The resource you requested could not be found.
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/tv/featured:
