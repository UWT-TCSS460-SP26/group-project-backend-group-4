openapi: 3.0.3
info:
  title: TCSS 460 Group Project API
  description: |
    **Team:** Group 4
    **Deployed URL:** https://group-project-backend-group-4.onrender.com

    A RESTful API for a move and TV review community.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://group-project-backend-group-4.onrender.com
    description: Production deployment

tags:
  - name: General
    description: General-purpose routes
  - name: Authentication
    description: Routes for user authentication
  - name: Movies
    description: Routes used with Movies
  - name: TV Shows
    description: Routes used with TV Shows
  - name: Reviews
    description: Routes used with persisted user reviews

paths:
  /heartbeat:
    get:
      tags: [General]
      summary: Heartbeat
      description: Returns the health status of the API.
      responses:
        '200':
          description: API is alive and running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'healthy'
  /auth/dev-login:
    post:
      tags: [Authentication]
      summary: Dev Login
      description: |
        **TEMPORARY — Sprint 2 only.**
        Accepts a username, find-or-creates a user row with role='user', and returns a signed JWT.
        This endpoint does NOT validate a password. It is a local-development stand-in for the real Auth-Squared integration coming in Sprint 3.
        **DO NOT deploy this router to a public URL.**

        Admin accounts must be seeded separately — this endpoint only creates regular users. To log in as an admin, create the user via your seed script and then POST the same username here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  example: alice
                email:
                  type: string
                  format: email
                  example: alice@example.test
                  description: Optional; defaults to username@dev.local
      responses:
        '200':
          description: Successfully logged in and returned a JWT
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Missing or invalid username
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: username is required
        '500':
          description: Server configuration error (e.g. JWT_SECRET missing)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: JWT_SECRET is not configured
  /api/movies/{movie_id}:
    get:
      tags: [Movies]
      summary: Movie Details
      description: Provides details on the provided movie, based on it's provided id
      parameters:
        - name: movie_id
          in: path
          required: true
          schema:
            type: integer
          description: TMDB movie ID
      responses:
        '200':
          description: Successfully get back movie details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                    example: 550
                  title:
                    type: string
                    example: Fight Club
                  overview:
                    type: string
                    example: A ticking-time-bomb insomniac and a slippery soap salesman channel primal male aggression into a shocking new form of therapy. Their concept catches on, with underground \"fight clubs\" forming in every town, until an eccentric gets in the way and ignites an out-of-control spiral toward oblivion.
                  release_date:
                    type: string
                    example: '1999-10-15'
                  poster_path:
                    type: string
                    example: /jSziioSwPVrOy9Yow3XhWIBDjq1.jpg
                  budget:
                    type: number
                    example: 63000000
                  genres:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                          example: 18
                        name:
                          type: string
                          example: Drama
        '400':
          description: movie_id missing in route parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: movie_id is required
        '404':
          description: movie_id doesn't exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: The resource you requested could not be found.
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/movies/popular:
    get:
      tags: [Movies]
      summary: Popular Movies
      description: Returns content sorted by popularity using the TMDB discover endpoint. Showcases widely appealing movies.
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            default: 'desc'
            enum: ['desc', 'asc']
      responses:
        '200':
          description: Successfully retrieved a list of popular movies
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    title:
                      type: string
                    overview:
                      type: string
                    release_date:
                      type: string
                    poster_path:
                      type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/movies/featured:
    get:
      tags: [Movies]
      summary: Featured Movies
      description: Returns trending movies over a specified time frame. This is a temporary solution until the user-based recommendation system is implemented.
      parameters:
        - name: timeframe
          in: query
          required: false
          schema:
            type: string
            enum: [day, week]
            default: week
          description: The time frame for the trending movies.
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
      responses:
        '200':
          description: Successfully retrieved a list of featured movies
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    title:
                      type: string
                    overview:
                      type: string
                    release_date:
                      type: string
                    poster_path:
                      type: string
                    backdrop_path:
                      type: string
                    genre_ids:
                      type: array
                      items:
                        type: integer
                    original_language:
                      type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/movies/search:
    get:
      tags: [Movies]
      summary: Search Movies
      description: Search movies by title.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search term for movie titles.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 1000
          description: Page number for TMDB pagination.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          description: Maximum number of results returned in this response.
      responses:
        '200':
          description: Successfully retrieved movie search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        title:
                          type: string
                        release_date:
                          type: string
                        adult:
                          type: boolean
                        poster_path:
                          type: string
        '400':
          description: Invalid search query or pagination parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                missingQuery:
                  summary: Missing required q parameter
                  value:
                    error: q is required and must be a string
                invalidPagination:
                  summary: Invalid page or limit values
                  value:
                    error: Validation failed
                    details: page must be an integer between 1 and 1000
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/tv/search:
    get:
      tags: [TV Shows]
      summary: Search TV Shows
      description: Search TV shows by title.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search term for TV show titles.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 1000
          description: Page number for TMDB pagination.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          description: Maximum number of results returned in this response.
      responses:
        '200':
          description: Successfully retrieved TV search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        title:
                          type: string
                        release_date:
                          type: string
                        adult:
                          type: boolean
                        poster_path:
                          type: string
        '400':
          description: Invalid search query or pagination parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                missingQuery:
                  summary: Missing required q parameter
                  value:
                    error: q is required and must be a string
                invalidPagination:
                  summary: Invalid page or limit values
                  value:
                    error: Validation failed
                    details: page must be an integer between 1 and 1000
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/tv/{series_id}:
    get:
      tags: [TV Shows]
      summary: TV Show Details
      description: Provides details on the provided TV Show, based on it's provided id
      parameters:
        - name: series_id
          in: path
          required: true
          schema:
            type: integer
          description: TMDB series ID
      responses:
        '200':
          description: Successfully get back TV details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                    example: 1396
                  name:
                    type: string
                    example: Breaking Bad
                  overview:
                    type: string
                    example: Walter White, a New Mexico chemistry teacher, is diagnosed with Stage III cancer and given a prognosis of only two years left to live. He becomes filled with a sense of fearlessness and an unrelenting desire to secure his family's financial future at any cost as he enters the dangerous world of drugs and crime.
                  first_air_date:
                    type: string
                    example: 2008-01-20
                  poster_path:
                    type: string
                    example: /ztkUQFLlC19CCMYHW9o1zWhJRNq.jpg
                  status:
                    type: string
                    example: Ended
                  genres:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                          example: 18
                        name:
                          type: string
                          example: Drama
        '400':
          description: series_id missing in route parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: series_id is required
        '404':
          description: series_id doesn't exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: The resource you requested could not be found.
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/tv/featured:
    get:
      tags: [TV Shows]
      summary: Featured TV Shows
      description: Returns trending TV shows over a specified time frame. This is a temporary solution until the user-based recommendation system is implemented.
      parameters:
        - name: timeframe
          in: query
          required: false
          schema:
            type: string
            enum: [day, week]
            default: week
          description: The time frame for the trending TV shows.
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
      responses:
        '200':
          description: Successfully retrieved a list of featured TV shows
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    name:
                      type: string
                    overview:
                      type: string
                    first_air_date:
                      type: string
                    poster_path:
                      type: string
                    backdrop_path:
                      type: string
                    genre_ids:
                      type: array
                      items:
                        type: integer
                    original_language:
                      type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /api/tv/popular:
    get:
      tags: [TV Shows]
      summary: Popular TV Shows
      description: Returns content sorted by popularity using the TMDB discover endpoint. Showcases widely appealing TV shows.
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            default: 'desc'
            enum: ['desc', 'asc']
      responses:
        '200':
          description: Successfully retrieved a list of popular TV shows
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    name:
                      type: string
                    overview:
                      type: string
                    first_air_date:
                      type: string
                    poster_path:
                      type: string
                    backdrop_path:
                      type: string
                    genre_ids:
                      type: array
                      items:
                        type: integer
                    original_language:
                      type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB_API_KEY is not configured
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach the TMDB API
  /reviews:
    get:
      tags: [Reviews]
      summary: List Reviews
      description: Returns paginated reviews for a given TMDB identifier.
      parameters:
        - name: tmdbId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: TMDB identifier to scope review results.
        - name: mediaType
          in: query
          required: false
          schema:
            type: string
            enum: [movie, tv]
          description: Optional media type filter.
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Optional author user id filter.
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional case-insensitive search against review title/body.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [id, title, createdAt, updatedAt]
            default: createdAt
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Reviews retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        userId:
                          type: integer
                        tmdbId:
                          type: integer
                        mediaType:
                          type: string
                          enum: [movie, tv]
                        title:
                          type: string
                        body:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
                        user:
                          type: object
                          properties:
                            id:
                              type: integer
                            username:
                              type: string
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        '400':
          description: Invalid or missing query parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      tags: [Reviews]
      summary: Create Review
      description: Creates a review for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tmdbId, mediaType, title, body]
              properties:
                tmdbId:
                  type: integer
                  minimum: 1
                mediaType:
                  type: string
                  enum: [movie, tv]
                title:
                  type: string
                body:
                  type: string
      responses:
        '201':
          description: Review created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '400':
          description: Validation error.
        '401':
          description: Missing or invalid bearer token.
        '500':
          description: Failed to create review.
  /reviews/{id}:
    get:
      tags: [Reviews]
      summary: Get Review By ID
      description: Returns one review by review identifier.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Review retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '400':
          description: Invalid review id.
        '404':
          description: Review not found.
    put:
      tags: [Reviews]
      summary: Update Review
      description: Updates a review owned by the requester, or by an admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tmdbId:
                  type: integer
                  minimum: 1
                mediaType:
                  type: string
                  enum: [movie, tv]
                title:
                  type: string
                body:
                  type: string
      responses:
        '200':
          description: Review updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '400':
          description: Validation error.
        '401':
          description: Missing or invalid bearer token.
        '403':
          description: Not allowed to modify this review.
        '404':
          description: Review not found.
        '500':
          description: Failed to update review.
    delete:
      tags: [Reviews]
      summary: Delete Review
      description: Deletes a review owned by the requester, or by an admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Review deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '400':
          description: Invalid review id.
        '401':
          description: Missing or invalid bearer token.
        '403':
          description: Not allowed to delete this review.
        '404':
          description: Review not found.
        '500':
          description: Failed to delete review.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
